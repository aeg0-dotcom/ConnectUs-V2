<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ConnectUs-V2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      // Buraya src/main.js (veya App.js) içindeki tüm kodlarını kopyalayıp yapıştırabilirsin.
      // Örnek basit bir test bileşeni:
      function App() {
        return (
          <div style={{ textAlign: 'center', marginTop: '50px' }}>
            <h1>ConnectUs-V2 Yayında!</h1>
            <p>Eğer bu yazıyı görüyorsan React çalışıyor demektir.</p>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
